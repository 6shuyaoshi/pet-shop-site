<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paw & Purr 瀹犵墿搴?/title>
  <style>
:root {
  color-scheme: light;
  --ink: #1f2a2e;
  --muted: #657177;
  --line: #d9e3df;
  --paper: #fffdf8;
  --mint: #cbeee1;
  --leaf: #277a5b;
  --coral: #f06f55;
  --sun: #ffd66b;
  --sky: #d8ecff;
  --rose: #ffe0df;
  --shadow: 0 18px 50px rgba(37, 48, 50, 0.13);
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  color: var(--ink);
  background: var(--paper);
  font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
  line-height: 1.5;
}

a {
  color: inherit;
  text-decoration: none;
}

button,
input,
select {
  font: inherit;
}

.site-header {
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  min-height: 76px;
  padding: 12px clamp(18px, 5vw, 64px);
  background: rgba(255, 253, 248, 0.92);
  border-bottom: 1px solid rgba(217, 227, 223, 0.8);
  backdrop-filter: blur(18px);
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  min-width: 180px;
}

.brand-mark {
  display: grid;
  place-items: center;
  width: 42px;
  height: 42px;
  color: #fff;
  background: var(--leaf);
  border-radius: 8px;
  font-weight: 800;
}

.brand strong,
.brand small {
  display: block;
}

.brand small {
  color: var(--muted);
  font-size: 12px;
}

.nav-links {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
}

.nav-links a {
  padding: 8px 12px;
  border-radius: 8px;
  color: #3f4e53;
  font-size: 14px;
}

.nav-links a:hover {
  background: var(--mint);
}

.cart-button {
  position: relative;
  display: grid;
  place-items: center;
  width: 44px;
  height: 44px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
}

.cart-count {
  position: absolute;
  top: -7px;
  right: -7px;
  display: grid;
  place-items: center;
  min-width: 22px;
  height: 22px;
  padding: 0 6px;
  color: #fff;
  background: var(--coral);
  border-radius: 99px;
  font-size: 12px;
  font-weight: 700;
}

.hero {
  display: grid;
  grid-template-columns: minmax(0, 0.9fr) minmax(340px, 1.1fr);
  align-items: center;
  gap: clamp(24px, 5vw, 64px);
  min-height: calc(100vh - 126px);
  padding: clamp(36px, 7vw, 84px) clamp(18px, 5vw, 64px) 24px;
  background: linear-gradient(90deg, rgba(203, 238, 225, 0.82), rgba(255, 224, 223, 0.76));
}

.eyebrow {
  margin: 0 0 10px;
  color: var(--leaf);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: uppercase;
}

h1,
h2,
h3,
p {
  margin-top: 0;
}

h1 {
  max-width: 740px;
  margin-bottom: 16px;
  font-size: clamp(44px, 7vw, 82px);
  line-height: 0.96;
  letter-spacing: 0;
}

h2 {
  margin-bottom: 12px;
  font-size: clamp(28px, 4vw, 44px);
  line-height: 1.06;
  letter-spacing: 0;
}

h3 {
  margin-bottom: 8px;
  font-size: 20px;
  line-height: 1.2;
  letter-spacing: 0;
}

.hero-text {
  max-width: 610px;
  margin-bottom: 24px;
  color: #3d4c51;
  font-size: 18px;
}

.hero-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 28px;
}

.primary-link,
.secondary-link,
.booking-form button,
.product-bottom button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 44px;
  padding: 10px 18px;
  border-radius: 8px;
  font-weight: 800;
  cursor: pointer;
}

.primary-link,
.booking-form button,
.product-bottom button {
  color: #fff;
  background: var(--leaf);
  border: 0;
}

.secondary-link {
  background: #fff;
  border: 1px solid var(--line);
}

.quick-stats {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  max-width: 560px;
  gap: 10px;
}

.quick-stats span {
  min-height: 72px;
  padding: 12px;
  background: rgba(255, 255, 255, 0.7);
  border: 1px solid rgba(255, 255, 255, 0.9);
  border-radius: 8px;
  color: var(--muted);
}

.quick-stats strong {
  display: block;
  color: var(--ink);
  font-size: 24px;
}

.hero-image {
  width: 100%;
  max-height: 520px;
  object-fit: cover;
  border-radius: 8px;
  box-shadow: var(--shadow);
}

.toolbar {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 1px;
  margin: 0 clamp(18px, 5vw, 64px);
  transform: translateY(-1px);
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--line);
}

.toolbar div {
  min-height: 86px;
  padding: 18px;
  background: #fff;
}

.toolbar strong,
.toolbar span {
  display: block;
}

.toolbar span {
  color: var(--muted);
}

.section {
  padding: clamp(54px, 8vw, 96px) clamp(18px, 5vw, 64px);
}

.section-heading {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 20px;
  margin-bottom: 24px;
}

.section-heading p:last-child {
  max-width: 520px;
  color: var(--muted);
}

.filter-group {
  display: inline-flex;
  gap: 6px;
  padding: 5px;
  background: #edf6f2;
  border-radius: 8px;
}

.filter {
  min-width: 60px;
  min-height: 36px;
  border: 0;
  border-radius: 7px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
}

.filter.active {
  color: #fff;
  background: var(--leaf);
}

.service-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 18px;
}

.service-card,
.product-card,
.booking-form,
.visit-panel {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: 0 12px 30px rgba(31, 42, 46, 0.07);
}

.service-card {
  overflow: hidden;
}

.service-card[hidden] {
  display: none;
}

.service-card img {
  display: block;
  width: 100%;
  aspect-ratio: 3 / 2;
  object-fit: cover;
}

.service-card div {
  padding: 20px;
}

.service-card p,
.product-card p,
.appointment-copy p,
.visit-section p {
  color: var(--muted);
}

.tag {
  display: inline-flex;
  margin-bottom: 10px;
  padding: 5px 9px;
  color: #7b371f;
  background: #ffe7c4;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 800;
}

.shop-section {
  background: #eef8f5;
}

.product-layout {
  display: grid;
  grid-template-columns: minmax(280px, 0.82fr) minmax(0, 1.18fr);
  gap: 22px;
}

.product-feature {
  width: 100%;
  height: 100%;
  min-height: 420px;
  object-fit: cover;
  border-radius: 8px;
  box-shadow: var(--shadow);
}

.product-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
}

.product-card {
  display: flex;
  flex-direction: column;
  min-height: 202px;
  padding: 20px;
}

.product-icon {
  display: grid;
  place-items: center;
  width: 44px;
  height: 44px;
  margin-bottom: 16px;
  background: var(--sky);
  border-radius: 8px;
  font-size: 24px;
}

.product-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  margin-top: auto;
}

.product-bottom button {
  min-width: 76px;
}

.appointment-section {
  display: grid;
  grid-template-columns: minmax(260px, 0.8fr) minmax(320px, 1.2fr);
  gap: 28px;
  align-items: start;
}

.booking-form {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
  padding: 22px;
}

.booking-form label {
  display: grid;
  gap: 8px;
  color: #3f4e53;
  font-weight: 700;
}

.booking-form input,
.booking-form select {
  width: 100%;
  min-height: 44px;
  padding: 9px 11px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--ink);
}

.booking-form button,
.booking-output {
  grid-column: 1 / -1;
}

.booking-output {
  min-height: 44px;
  padding: 12px 14px;
  border-radius: 8px;
  background: #f3faf7;
  color: var(--leaf);
  font-weight: 800;
}

.booking-output:empty {
  display: none;
}

.visit-section {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(280px, 420px);
  gap: 24px;
  align-items: center;
  background: var(--rose);
}

.visit-panel {
  display: grid;
  gap: 8px;
  padding: 22px;
}

.visit-panel a {
  color: var(--leaf);
  font-size: 28px;
  font-weight: 900;
}

.visit-panel span {
  color: var(--muted);
}

.cart-panel {
  position: fixed;
  top: 0;
  right: 0;
  z-index: 40;
  display: flex;
  flex-direction: column;
  width: min(390px, 92vw);
  height: 100vh;
  padding: 22px;
  background: #fff;
  box-shadow: -20px 0 50px rgba(0, 0, 0, 0.17);
  transform: translateX(105%);
  transition: transform 180ms ease;
}

.cart-panel.open {
  transform: translateX(0);
}

.cart-header,
.cart-total {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.cart-header h2 {
  margin: 0;
  font-size: 26px;
}

.cart-header button {
  width: 40px;
  height: 40px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
  font-size: 26px;
}

.cart-panel ul {
  display: grid;
  gap: 10px;
  margin: 20px 0;
  padding: 0;
  list-style: none;
  overflow: auto;
}

.cart-panel li {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
}

.cart-total {
  margin-top: auto;
  padding-top: 16px;
  border-top: 1px solid var(--line);
  font-size: 20px;
}

.cart-backdrop {
  position: fixed;
  inset: 0;
  z-index: 30;
  display: none;
  background: rgba(20, 28, 30, 0.28);
}

.cart-panel.open + .cart-backdrop {
  display: block;
}

@media (max-width: 900px) {
  .site-header {
    align-items: flex-start;
    flex-wrap: wrap;
  }

  .nav-links {
    order: 3;
    width: 100%;
    justify-content: flex-start;
  }

  .hero,
  .product-layout,
  .appointment-section,
  .visit-section {
    grid-template-columns: 1fr;
  }

  .hero {
    min-height: auto;
  }

  .hero-image {
    max-height: none;
  }

  .service-grid {
    grid-template-columns: 1fr;
  }

  .product-feature {
    min-height: 280px;
  }
}

@media (max-width: 620px) {
  .site-header {
    padding-inline: 14px;
  }

  .brand {
    min-width: 0;
  }

  h1 {
    font-size: 42px;
  }

  .hero,
  .section {
    padding-inline: 14px;
  }

  .quick-stats,
  .toolbar,
  .product-grid,
  .booking-form {
    grid-template-columns: 1fr;
  }

  .toolbar {
    margin-inline: 14px;
  }

  .section-heading {
    align-items: stretch;
    flex-direction: column;
  }

  .filter-group {
    width: 100%;
  }

  .filter {
    flex: 1;
  }

  .visit-panel a {
    font-size: 24px;
  }
}

</style>
</head>

  <script>
const filters = document.querySelectorAll("[data-filter]");
const serviceCards = document.querySelectorAll("[data-pet]");
const cartPanel = document.querySelector("[data-cart-panel]");
const cartItems = document.querySelector("[data-cart-items]");
const cartCount = document.querySelector("[data-cart-count]");
const cartTotal = document.querySelector("[data-cart-total]");
const cart = [];

filters.forEach((button) => {
  button.addEventListener("click", () => {
    const filter = button.dataset.filter;
    filters.forEach((item) => item.classList.toggle("active", item === button));
    serviceCards.forEach((card) => {
      const pets = card.dataset.pet.split(" ");
      card.hidden = filter !== "all" && !pets.includes(filter);
    });
  });
});

document.querySelectorAll("[data-add-cart]").forEach((button) => {
  button.addEventListener("click", () => {
    cart.push({
      name: button.dataset.addCart,
      price: Number(button.dataset.price)
    });
    renderCart();
    openCart();
  });
});

document.querySelectorAll("[data-open-cart]").forEach((button) => {
  button.addEventListener("click", openCart);
});

document.querySelectorAll("[data-close-cart]").forEach((button) => {
  button.addEventListener("click", closeCart);
});

function openCart() {
  cartPanel.classList.add("open");
  cartPanel.setAttribute("aria-hidden", "false");
}

function closeCart() {
  cartPanel.classList.remove("open");
  cartPanel.setAttribute("aria-hidden", "true");
}

function renderCart() {
  cartItems.innerHTML = "";
  if (cart.length === 0) {
    const empty = document.createElement("li");
    empty.textContent = "杩樻病鏈夊姞鍏ュ晢鍝?;
    cartItems.append(empty);
  } else {
    cart.forEach((item) => {
      const li = document.createElement("li");
      li.innerHTML = `<span>${item.name}</span><strong>楼${item.price}</strong>`;
      cartItems.append(li);
    });
  }
  const total = cart.reduce((sum, item) => sum + item.price, 0);
  cartCount.textContent = String(cart.length);
  cartTotal.textContent = `楼${total}`;
}

document.querySelector("[data-booking-form]").addEventListener("submit", (event) => {
  event.preventDefault();
  const form = event.currentTarget;
  const data = new FormData(form);
  const owner = data.get("owner").trim();
  const pet = data.get("pet");
  const service = data.get("service");
  const date = data.get("date");
  const output = document.querySelector("[data-booking-output]");

  if (!owner || !pet || !service || !date) {
    output.textContent = "璇疯ˉ鍏ㄩ绾︿俊鎭€?;
    return;
  }

  output.textContent = `${owner}锛屽凡涓轰綘鐨?{pet}鐢熸垚 ${date} 鐨勩€?{service}銆嶉绾﹀崱銆俙;
});

renderCart();

</script>
